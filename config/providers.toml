[providers.qwen]
adapter = "openai_chat"
secrets = ["DASHSCOPE_API_KEY"]
model_env = "QWEN_MODEL"
default_model = "qwen-max-latest"
concurrency_env = "QWEN_CONCURRENCY"
default_concurrency = 3
