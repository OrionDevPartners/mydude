# =============================================================================
# env_1 — PROVIDER MAPPING LAYER (committed to git)
# =============================================================================
# This file maps capabilities/functions to provider implementations. It ships
# to git. It contains *no secret values* — only the NAMES of the secrets each
# provider needs (those values live in env_2: Replit Secrets / the credential
# vault, never committed).
#
# To swap or add a provider you edit ONLY this file:
#   * swap the active LLM provider  -> change `enabled` / `required` below
#   * add a brand-new LLM provider  -> add one [providers.<key>] block here and
#                                      register one adapter class in
#                                      src/providers/registry.py
# Application code never names a vendor; it resolves everything through here.
# =============================================================================

[capabilities]
# Maps each capability to its implementation strategy. Future capabilities
# (email, storage, ...) plug in here without touching call-site code.
llm = "swarm"
browser = "engine"

[llm]
# Providers the LLM swarm may use. Remove a key to drop that provider; the
# swarm degrades gracefully to whatever remains configured at runtime.
# Local providers (ollama, mlx) are exec_locus=local: they only enter the
# fanout when their local server is actually listening, and they are the
# local_degraded fallback tier when cloud_shift=false or cloud is unavailable.
enabled = ["openai", "anthropic", "gemini", "grok", "deepseek", "mistral", "qwen", "ollama", "mlx"]

# Providers whose secrets MUST be present at boot. The boot handshake hard-fails
# (the app refuses to serve traffic) if any required secret is missing. Must be
# a subset of `enabled`. Leave empty to let the runtime credential vault be
# populated before you activate a provider for production.
required = []

# -----------------------------------------------------------------------------
# Provider definitions. `secrets` lists the env_2 secret names (NOT values).
# `adapter` selects the implementation registered in src/providers/registry.py.
# -----------------------------------------------------------------------------

[providers.openai]
adapter = "openai_chat"
secrets = ["OPENAI_API_KEY"]
model_env = "OPENAI_MODEL"
# Frontier default: GPT-5.5. Patterns autorotate UP the lineage — prefer any
# gpt-5* the live API lists (newest wins via model_resolver), else gpt-4.1*.
# Operator override: set OPENAI_MODEL to pin a specific id.
default_model = "gpt-5.5"
concurrency_env = "OPENAI_CONCURRENCY"
default_concurrency = 4
role_hint = "Implementation + patches + practical code changes + polished frontend/UI build-out"
model_patterns = ['^gpt-5', '^gpt-4\.1(?!.*codex)']
# exec_locus: where this provider's models run (in_azure | anthropic_hosted | provider_hosted | local)
# Used by the jurisdiction router and model-promotion gate to enforce exec_locus_pin.
exec_locus = "in_azure"
specialty = "Implementation, agentic coding & polished frontend/UX build-out"

# benchmark_profile: per-category strength in [0,1] for benchmark-aware lead
# routing (src/swarm/benchmark_routing.py). Operator-tunable; never hardcoded
# at a call site. frontend_uiux is the EXTREME UI/UX specialist category.
[providers.openai.benchmark_profile]
coding = 0.95
agentic = 0.93
frontend_uiux = 0.92
reasoning = 0.88
math = 0.85
long_context = 0.82
creative = 0.82
multilingual = 0.85
security = 0.82
general = 0.92

[providers.anthropic]
adapter = "anthropic_messages"
secrets = ["ANTHROPIC_API_KEY"]
model_env = "ANTHROPIC_MODEL"
# Frontier default: Claude Opus 4.8. alias_env (ANTHROPIC_OPUS_ALIAS) still wins
# as an explicit operator pin; otherwise patterns autorotate UP the Opus lineage
# from the live model list (Anthropic SDK models.list), then Sonnet as fallback.
default_model = "claude-opus-4-8"
concurrency_env = "ANTHROPIC_CONCURRENCY"
default_concurrency = 3
role_hint = "Security review + architecture coherence + failure modes"
model_patterns = ['claude-opus-4', 'claude-opus', 'claude-sonnet-4', 'claude-sonnet']
alias_env = "ANTHROPIC_OPUS_ALIAS"
exec_locus = "anthropic_hosted"
specialty = "Architecture, security review & long-context reasoning"

[providers.anthropic.benchmark_profile]
reasoning = 0.95
security = 0.95
coding = 0.93
long_context = 0.93
agentic = 0.9
math = 0.88
frontend_uiux = 0.85
creative = 0.85
multilingual = 0.85
general = 0.92

[providers.gemini]
adapter = "gemini_generate"
# This deployment's working, billing-enabled Gemini credential lives in the
# `google_ai_studio` secret, so it is the primary. The conventional names are
# kept as fallbacks for portability, but they must NOT take precedence here: a
# stale `GEMINI_API_KEY` in this environment points at a Google project whose
# Generative Language API is disabled, which would otherwise win and fail loud
# with PermissionDenied. First present wins (Governance Pillar #3 — separate
# provider from secrets).
secrets = ["google_ai_studio"]
secret_fallbacks = ["GEMINI_API_KEY", "GOOGLE_API_KEY"]
model_env = "GEMINI_MODEL"
# Pinned to Gemini 3.1 Pro (operator directive: this provider runs 3.1 Pro only).
# The pattern is anchored so it matches ONLY gemini-3.1-pro / -preview and never
# the -customtools, -image, or flash / 2.x variants the live API also lists.
default_model = "models/gemini-3.1-pro-preview"
concurrency_env = "GEMINI_CONCURRENCY"
default_concurrency = 3
role_hint = "Edge cases + alternative approaches + high recall brainstorming"
model_patterns = ['gemini-3\.1-pro(-preview)?$']
exec_locus = "in_azure"
specialty = "Multimodal reasoning, long-context & visual/UX critique"

# Gemini carries the strongest frontend_uiux weight: its native multimodal/
# visual grounding makes it the default UI/UX lead (the future visual "vision
# brain" follow-up builds on this). Pin is unchanged — only routing weight.
[providers.gemini.benchmark_profile]
frontend_uiux = 0.94
long_context = 0.95
multilingual = 0.93
reasoning = 0.9
creative = 0.88
coding = 0.88
agentic = 0.85
math = 0.88
security = 0.82
general = 0.9

[providers.grok]
adapter = "openai_chat"
secrets = ["GROK_API_KEY"]
model_env = "GROK_MODEL"
# Frontier default: Grok 4.3. Patterns autorotate UP the lineage — newest
# grok-4* first, then grok-3*, then any grok the live API lists.
default_model = "grok-4.3"
concurrency_env = "GROK_CONCURRENCY"
default_concurrency = 3
role_hint = "Creative solutions + unusual optimizations + growth/monetization angles"
model_patterns = ['grok-4', 'grok-3', 'grok']
base_url_env = "GROK_BASE_URL"
default_base_url = "https://api.x.ai/v1"
exec_locus = "in_azure"
specialty = "Creative solutions, math/reasoning & novel optimizations"

[providers.grok.benchmark_profile]
creative = 0.93
math = 0.9
reasoning = 0.9
agentic = 0.87
coding = 0.88
long_context = 0.85
frontend_uiux = 0.83
multilingual = 0.84
security = 0.8
general = 0.88

# -----------------------------------------------------------------------------
# LOCAL / SOVEREIGN providers — offline inference, no API key required.
# These run on the local sovereign stack (infra/mydude/local/sovereign_stack.yaml).
# exec_locus=local marks them as the local_degraded fallback tier: the
# jurisdiction router selects them when cloud_shift=false or exec_locus_pin=local,
# and the swarm only includes one in the fanout when its server is listening.
# No `secrets` entry — availability is gated on the local server, not a key.
#
# Cloudflare Mesh (remote local node)
# ------------------------------------
# When MyDude is cloud-deployed but the model server runs on a separate box that
# is enrolled as a Cloudflare Mesh peer (warp-cli headless, WARP-to-WARP enabled),
# set base_url_env to the node's stable Mesh IP instead of localhost. Example:
#
#   OLLAMA_BASE_URL=http://100.96.0.1:11434/v1   # Mesh IP of the Ollama node
#   MLX_BASE_URL=http://100.96.0.2:11435/v1       # Mesh IP of the MLX node
#
# Also raise the TCP availability probe timeout to account for cross-network
# latency — 0.5 s is too tight for Mesh; use 2.0 s or higher:
#
#   LOCAL_PROBE_TIMEOUT=2.0           # shared fallback for all local providers
#   OLLAMA_PROBE_TIMEOUT=2.0          # per-provider override (takes precedence)
#   MLX_PROBE_TIMEOUT=2.0
#
# Nothing else needs to change: the same URL is used for the probe and all API
# calls. See docs/cloudflare-mesh-local-llm.md for the full node-side setup guide.
# -----------------------------------------------------------------------------

[providers.ollama]
adapter = "ollama_chat"
secrets = []
model_env = "OLLAMA_MODEL"
default_model = "llama3.2:3b"
concurrency_env = "OLLAMA_CONCURRENCY"
default_concurrency = 2
role_hint = "Local sovereign inference — privacy-preserving offline fallback"
# Set to a Cloudflare Mesh IP to reach a remote Ollama node (e.g. http://100.96.0.1:11434/v1)
base_url_env = "OLLAMA_BASE_URL"
default_base_url = "http://localhost:11434/v1"
# Probe timeout env var: set OLLAMA_PROBE_TIMEOUT=2.0 when using a Mesh endpoint
probe_timeout_env = "OLLAMA_PROBE_TIMEOUT"
exec_locus = "local"
specialty = "Local sovereign inference — privacy-preserving offline fallback"

# Local models carry modest, uniform weights so a cloud frontier provider leads
# whenever one is available; locals lead only when they are the sole available
# tier (cloud_shift=false / offline). They never advertise a frontier specialty.
[providers.ollama.benchmark_profile]
general = 0.6
coding = 0.55
reasoning = 0.55
agentic = 0.5
math = 0.5
long_context = 0.5
creative = 0.5
multilingual = 0.5
security = 0.5
frontend_uiux = 0.5

[providers.mlx]
adapter = "mlx_chat"
secrets = []
model_env = "MLX_MODEL"
default_model = "mlx-community/Qwen3-14B-8bit"
concurrency_env = "MLX_CONCURRENCY"
default_concurrency = 1
role_hint = "Local Apple-silicon inference — privacy-preserving offline fallback"
# Set to a Cloudflare Mesh IP to reach a remote MLX node (e.g. http://100.96.0.2:11435/v1)
base_url_env = "MLX_BASE_URL"
default_base_url = "http://localhost:11435/v1"
# Probe timeout env var: set MLX_PROBE_TIMEOUT=2.0 when using a Mesh endpoint
probe_timeout_env = "MLX_PROBE_TIMEOUT"
exec_locus = "local"
specialty = "Local Apple-silicon inference — privacy-preserving offline fallback"

[providers.mlx.benchmark_profile]
general = 0.6
coding = 0.55
reasoning = 0.55
agentic = 0.5
math = 0.5
long_context = 0.5
creative = 0.5
multilingual = 0.5
security = 0.5
frontend_uiux = 0.5

# -----------------------------------------------------------------------------
# PROVIDER-HOSTED frontier vendors — OpenAI-compatible APIs reached directly
# over each vendor's own hosted endpoint (NOT Azure, NOT Anthropic, NOT local).
# They reuse the openai_chat adapter (base_url_env + primary secret), so adding
# one needs only a config block — no new adapter class. exec_locus is the single
# generic "provider_hosted" locus, so cloud_shift=false / EXEC_LOCUS_PIN=local
# correctly excludes them and pin=in_azure does too. `secrets` lists NAMES only;
# they are enabled-not-required, so the swarm runs without their keys and simply
# includes each one once its key is present in the vault.
# -----------------------------------------------------------------------------

[providers.deepseek]
adapter = "openai_chat"
secrets = ["DEEPSEEK_API_KEY"]
model_env = "DEEPSEEK_MODEL"
default_model = "deepseek-chat"
concurrency_env = "DEEPSEEK_CONCURRENCY"
default_concurrency = 3
role_hint = "Cost-efficient deep coding + math/reasoning"
model_patterns = ['deepseek-v', 'deepseek-reasoner', 'deepseek-chat', 'deepseek']
base_url_env = "DEEPSEEK_BASE_URL"
default_base_url = "https://api.deepseek.com"
exec_locus = "provider_hosted"
specialty = "Cost-efficient deep coding & math reasoning"

[providers.deepseek.benchmark_profile]
coding = 0.93
math = 0.93
reasoning = 0.92
agentic = 0.85
long_context = 0.82
frontend_uiux = 0.78
creative = 0.78
multilingual = 0.82
security = 0.8
general = 0.85

[providers.mistral]
adapter = "openai_chat"
secrets = ["MISTRAL_API_KEY"]
model_env = "MISTRAL_MODEL"
default_model = "mistral-large-latest"
concurrency_env = "MISTRAL_CONCURRENCY"
default_concurrency = 3
role_hint = "Efficient multilingual coding + general reasoning"
model_patterns = ['mistral-large', 'mistral']
base_url_env = "MISTRAL_BASE_URL"
default_base_url = "https://api.mistral.ai/v1"
exec_locus = "provider_hosted"
specialty = "Efficient multilingual coding & general reasoning"

[providers.mistral.benchmark_profile]
multilingual = 0.92
coding = 0.88
reasoning = 0.85
math = 0.83
agentic = 0.82
long_context = 0.82
creative = 0.82
