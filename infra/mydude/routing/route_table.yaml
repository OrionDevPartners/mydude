# =============================================================================
# MyDude Offline Route Table
# Used by the local sovereign stack when agents_home (cloud) is unreachable.
# This file is baked into the local stack and updated on each successful sync.
# =============================================================================
#
# AUTHORITY: agents_home is the authoritative source. This table is a
# cached projection, valid for offline operation only. When connectivity
# is restored, agents_home always takes precedence.
#
# exec_locus: in_azure | anthropic_hosted | local
# fallback_tiers: 1=preferred 2=cloud_shift 3=ssh_edge 4=local_degraded 5=refuse
# cloud_shift: true = egress permitted; false = local only (kill switch)
# =============================================================================

metadata:
  version: "1.0.0"
  generated_at: "2026-06-07T00:00:00Z"
  authority: agents_home
  status: offline_cache
  valid_for_offline: true
  max_age_hours: 24

cloud_shift:
  enabled: true
  note: "Matches agents_home.routing.cloud_shift at time of last sync"

domains:
