# Jurisdiction ladder (reference — enforced at runtime by jurisdiction.py)
jurisdiction_ladder:
  tier_0: "MyDude jurisdiction (agents_home) — routing authority"
  tier_1: "Foundry Model Router — within MyDude-granted Azure deployments only"
  tier_2: "LiteLLM — within MyDude-granted provider APIs only"

