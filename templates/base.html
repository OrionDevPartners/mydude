<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BoBot AI{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">🤖 BoBot AI</h1>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <span class="nav-icon">◈</span> Dashboard
                </a>
                <a href="/keys" class="nav-link {% if request.url.path == '/keys' %}active{% endif %}">
                    <span class="nav-icon">🔑</span> API Keys
                </a>
                <a href="/tasks/history" class="nav-link {% if '/tasks' in request.url.path and request.url.path != '/' %}active{% endif %}">
                    <span class="nav-icon">📋</span> Task History
                </a>
                <a href="#" class="nav-link disabled">
                    <span class="nav-icon">⚡</span> Capabilities <span class="badge">Soon</span>
                </a>
            </nav>
        </aside>
        <main class="main">
            <header class="header">
                <div class="header-title">{% block header_title %}Dashboard{% endblock %}</div>
                <a href="/logout" class="btn btn-sm btn-outline">Logout</a>
            </header>
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
