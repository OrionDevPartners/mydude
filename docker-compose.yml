# Local / cloud smoke-test stack for the MyDude.io web app.
# Brings up Postgres + the FastAPI app and exposes it on http://localhost:5050.
#   docker compose up --build
# Health check: curl http://localhost:5050/health  ->  {"status":"ok"}
#
# Note: host port 5050 is used so this does not clash with the Replit dev
# workflow that serves the same app on 5000. Container-internal port stays 5000.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mydude
      POSTGRES_PASSWORD: mydude
      POSTGRES_DB: mydude

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://mydude:mydude@db:5432/mydude
      SESSION_SECRET: local-dev-session-secret
      DEV_AUTH_BYPASS: "1"
      PORT: "5000"
    ports:
      - "5050:5000"
    depends_on:
      - db
